<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Read full specifications, reviews, and stock updates for this premium gear before placing your order.">
  <title>Apex Hardware - Product Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- App Header -->
  <header class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo-link">
        Apex Hardware<span class="logo-dot"></span>
      </a>
      
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="products.html" class="nav-link">Products</a></li>
          <li><a href="cart.html" class="nav-link">Cart</a></li>
        </ul>
      </nav>
      
      <div class="nav-actions">
        <!-- Cart Badge -->
        <a href="cart.html" class="cart-icon-container" aria-label="View Shopping Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-badge" id="cart-count">0</span>
        </a>

        <!-- Dynamic User Auth Nav -->
        <div id="auth-nav-container">
          <button onclick="location.href='login.html'" class="btn-nav-login">Log In</button>
          <button onclick="location.href='register.html'" class="btn-nav-register">Sign Up</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    
    <div style="margin-bottom: 2rem;">
      <a href="products.html" class="section-link" style="display: inline-flex; align-items: center; gap: 0.5rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to catalog
      </a>
    </div>

    <!-- Product Details Content -->
    <div class="product-details-container" id="product-details-content">
      <!-- Loaded dynamically via JavaScript -->
      <p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem;">Syncing product record details...</p>
    </div>

  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <div class="footer-logo">Apex Hardware<span class="logo-dot"></span></div>
      <ul class="footer-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
      <div style="text-align: right;">
        <div>&copy; 2026 Apex Hardware Inc. All rights reserved.</div>
        <div style="margin-top: 0.25rem; font-weight: 600; color: var(--primary);">Designed by BHUKYA KAIRAM</div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
