<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Apex Hardware account to check out and track your order history.">
  <title>Apex Hardware - Log In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- App Header -->
  <header class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo-link">
        Apex Hardware<span class="logo-dot"></span>
      </a>
      
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="products.html" class="nav-link">Products</a></li>
          <li><a href="cart.html" class="nav-link">Cart</a></li>
        </ul>
      </nav>
      
      <div class="nav-actions">
        <!-- Cart Badge -->
        <a href="cart.html" class="cart-icon-container" aria-label="View Shopping Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-badge" id="cart-count">0</span>
        </a>

        <!-- Dynamic User Auth Nav -->
        <div id="auth-nav-container">
          <button onclick="location.href='login.html'" class="btn-nav-login">Log In</button>
          <button onclick="location.href='register.html'" class="btn-nav-register">Sign Up</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    
    <div class="auth-page-container">
      
      <div class="auth-card">
        <div class="auth-header">
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-subtitle">Sign in to your secure account</p>
        </div>

        <!-- Error Alert -->
        <div class="auth-error" id="login-error-alert">Invalid credentials.</div>

        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" class="form-input" required placeholder="you@example.com">
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-input" required placeholder="••••••••" minlength="6">
          </div>

          <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
            Authenticate
          </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
          Don't have an account? <a href="register.html" class="auth-link">Sign Up</a>
        </div>

      </div>

    </div>

  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <div class="footer-logo">Apex Hardware<span class="logo-dot"></span></div>
      <ul class="footer-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
      <div style="text-align: right;">
        <div>&copy; 2026 Apex Hardware Inc. All rights reserved.</div>
        <div style="margin-top: 0.25rem; font-weight: 600; color: var(--primary);">Designed by BHUKYA KAIRAM</div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
